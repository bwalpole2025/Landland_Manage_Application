# Local development infrastructure: Postgres, Redis, and a MinIO (S3-compatible)
# object store. Bring it up with `docker compose up -d`, then:
#   npm run db:push && npm run db:seed && npm run dev
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: landland
      POSTGRES_PASSWORD: landland
      POSTGRES_DB: landland
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landland"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional S3-compatible storage for DOCUMENT_STORAGE_PROVIDER=s3.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: landland
      MINIO_ROOT_PASSWORD: landland-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
